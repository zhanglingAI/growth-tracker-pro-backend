# Growth Tracker Pro - Nginx 反向代理配置

upstream growth_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.growthtracker.cn;
    
    # 强制HTTPS (可选)
    # return 301 https://$server_name$request_uri;

    # 访问日志
    access_log /var/log/nginx/growth-api.access.log;
    error_log /var/log/nginx/growth-api.error.log;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API代理
    location /api/ {
        proxy_pass http://growth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查
    location /health {
        proxy_pass http://growth_backend/health;
        access_log off;
    }

    # 静态文件 (如果有)
    location /static/ {
        alias /opt/growth-tracker-pro/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
    }
}
