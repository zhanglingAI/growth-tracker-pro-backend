version: '3.8'

services:
  mysql:
    image: m.daocloud.io/docker.io/library/mysql:8.0
    container_name: growth-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: growth_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - growth-network

  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    container_name: growth-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - growth-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: growth-tracker-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - growth-network

volumes:
  mysql-data:

networks:
  growth-network:
    driver: bridge
